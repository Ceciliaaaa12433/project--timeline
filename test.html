<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片测试</title>
</head>
<body>
    <h1>图片测试</h1>
    <h2>测试图片路径</h2>
    <div>
        <h3>相对路径（无 ./ 前缀）</h3>
        <img src="v1-1.png" alt="v1-1.png" style="width:200px;height:auto;">
        <p>路径: v1-1.png</p>
    </div>
    <div>
        <h3>相对路径（有 ./ 前缀）</h3>
        <img src="./v1-1.png" alt="./v1-1.png" style="width:200px;height:auto;">
        <p>路径: ./v1-1.png</p>
    </div>
    <div>
        <h3>其他图片</h3>
        <img src="./v1-2.png" alt="./v1-2.png" style="width:200px;height:auto;">
        <p>路径: ./v1-2.png</p>
    </div>
</body>
</html>
